<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Jourdan</title>
    <meta name="description" content="Je documente mon parcours d'entrepreneur.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --pill-bg: #1a1a1a;
            --pill-border: rgba(255, 255, 255, 0.08);
            --input-bg: #141414;
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: rgba(255, 255, 255, 0.25);
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 32px 24px;
        }

        .header {
            display: flex;
            justify-content: center;
            margin-bottom: auto;
            padding-top: 8px;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 500;
        }

        .profile-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 40px 0;
        }

        .hero {
            font-size: clamp(2rem, 6vw, 4.25rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 40px;
            max-width: 850px;
        }

        .pills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 48px;
        }

        .pill {
            background: var(--pill-bg);
            border: 1px solid var(--pill-border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
        }

        .form {
            display: flex;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 999px;
            padding: 6px;
            max-width: 580px;
            width: 100%;
            transition: border-color 0.2s ease;
        }

        .form:focus-within {
            border-color: var(--input-focus);
        }

        .form input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            padding: 12px 18px;
            flex: 1;
            min-width: 0;
        }

        .form input::placeholder {
            color: var(--text-muted);
        }

        .form button {
            background: #ffffff;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }

        .form button:hover { opacity: 0.85; }
        .form button:disabled { opacity: 0.5; cursor: not-allowed; }

        .message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            color: var(--text-muted);
        }

        .message.success { color: #4ade80; }
        .message.error { color: #f87171; }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .socials {
            display: flex;
            gap: 8px;
        }

        .social {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--pill-bg);
            border: 1px solid var(--pill-border);
            color: var(--text);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s ease;
        }

        .social:hover { background: rgba(255, 255, 255, 0.08); }
        .social svg { width: 14px; height: 14px; }

        .meta {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .clock {
            background: var(--pill-bg);
            border: 1px solid var(--pill-border);
            padding: 6px 12px;
            border-radius: 999px;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 600px) {
            body { padding: 24px 16px; }
            .form {
                flex-direction: column;
                border-radius: 16px;
                padding: 8px;
            }
            .form input { padding: 14px 16px; }
            .form button { padding: 14px 24px; }
            .footer {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="profile">
            <div class="profile-avatar">CJ</div>
            <span>@charliejourdan</span>
        </div>
    </header>

    <main class="main">
        <h1 class="hero">Je documente mon parcours d'entrepreneur.</h1>

        <div class="pills">
            <span class="pill">Founder</span>
            <span class="pill">Builder</span>
            <span class="pill">Content Creator</span>
        </div>

        <form class="form" id="signup-form">
            <input type="text" id="firstname" placeholder="Prénom" required>
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit" id="submit-btn">S'inscrire</button>
        </form>

        <div class="message" id="message"></div>
    </main>

    <footer class="footer">
        <div class="socials">
            <a href="https://instagram.com/charliejourdan" target="_blank" rel="noopener" class="social">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                @charliejourdan
            </a>
            <a href="https://youtube.com/@charliejourdan" target="_blank" rel="noopener" class="social">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                @charliejourdan
            </a>
            <a href="https://discord.gg/your-invite" target="_blank" rel="noopener" class="social">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
                Discord
            </a>
        </div>

        <div class="meta">
            <span>Paris, France</span>
            <span class="clock" id="clock">--:--:--</span>
        </div>
    </footer>

    <script>
        // URL de ton Cloudflare Worker — pas de clé API ici, sécurisé
        const WORKER_URL = 'https://newsletter-signup.charliejourdan.workers.dev';

        // Horloge
        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Form
        const form = document.getElementById('signup-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageEl = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstname = document.getElementById('firstname').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!firstname || !email) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '...';
            messageEl.textContent = '';
            messageEl.className = 'message';

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, firstname })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (data.alreadyExists) {
                        messageEl.textContent = `Tu es déjà inscrit·e, ${firstname} !`;
                    } else {
                        messageEl.textContent = `Merci ${firstname}, c'est noté.`;
                    }
                    messageEl.className = 'message success';
                    form.reset();
                } else {
                    throw new Error(data.error || 'Erreur inconnue');
                }
            } catch (error) {
                console.error('Erreur:', error);
                messageEl.textContent = 'Oups, une erreur est survenue. Réessaie.';
                messageEl.className = 'message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "S'inscrire";
            }
        });
    </script>
</body>
</html>
