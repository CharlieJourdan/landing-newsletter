<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Jourdan</title>
    <meta name="description" content="J'automatise des chaînes YouTube. Niches, résultats, outils, conseils, optimisations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0712;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.55);
            --accent: #8b5cf6;
            --accent-soft: rgba(139, 92, 246, 0.15);
            --accent-border: rgba(139, 92, 246, 0.3);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus: rgba(139, 92, 246, 0.5);
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 32px 24px;
            position: relative;
        }

        /* Glow violet en arrière-plan */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.18) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        /* Main */
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 60px 0;
        }

        .hero {
            font-size: clamp(2rem, 6vw, 4.25rem);
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -0.035em;
            margin-bottom: 28px;
            max-width: 850px;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.75) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(0.95rem, 1.6vw, 1.05rem);
            color: var(--text-muted);
            margin-bottom: 48px;
            line-height: 1.5;
            max-width: 520px;
        }

        /* Form — format theodrcn (input + bouton sur même ligne) */
        .form {
            display: flex;
            gap: 6px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 999px;
            padding: 5px;
            max-width: 580px;
            width: 100%;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .form:focus-within {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .form input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            padding: 12px 18px;
            flex: 1;
            min-width: 0;
        }

        .form input::placeholder {
            color: var(--text-muted);
        }

        /* Fix autofill */
        .form input:-webkit-autofill,
        .form input:-webkit-autofill:hover,
        .form input:-webkit-autofill:focus,
        .form input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px var(--bg) inset !important;
            -webkit-text-fill-color: var(--text) !important;
            caret-color: var(--text);
            transition: background-color 5000s ease-in-out 0s;
            background-clip: text !important;
        }

        .form button {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        .form button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.45);
        }

        .form button:active { transform: translateY(0); }

        .form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            color: var(--text-muted);
            transition: opacity 0.3s ease;
        }

        .message.success { color: #a78bfa; }
        .message.error { color: #f87171; }

        /* Footer */
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: auto;
            padding-top: 24px;
            flex-wrap: wrap;
        }

        .social {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .social:hover {
            background: var(--accent-soft);
            border-color: var(--accent-border);
            color: var(--accent);
        }

        .social.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .social.disabled:hover {
            background: var(--input-bg);
            border-color: var(--input-border);
            color: var(--text);
        }

        .social svg {
            width: 14px;
            height: 14px;
        }

        /* MOBILE — empilage propre, pas de barre dégueu */
        @media (max-width: 600px) {
            body { padding: 24px 16px; }

            .main {
                padding: 40px 0;
            }

            .hero {
                font-size: 2.25rem;
                line-height: 1.1;
            }

            .subtitle {
                margin-bottom: 36px;
                padding: 0 8px;
            }

            /* Form mobile : empilage en colonne, pas de pill géante */
            .form {
                flex-direction: column;
                border-radius: 16px;
                padding: 8px;
                gap: 4px;
                max-width: 380px;
            }

            .form input {
                padding: 14px 16px;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.03);
            }

            .form button {
                padding: 14px 24px;
                width: 100%;
                border-radius: 12px;
                margin-top: 4px;
            }

            .footer {
                gap: 6px;
            }

            .social {
                font-size: 12px;
                padding: 7px 12px;
            }
        }
    </style>
</head>
<body>
    <main class="main">
        <h1 class="hero">J'automatise des chaînes YouTube.</h1>

        <p class="subtitle">Niches, résultats, outils, conseils, optimisations.</p>

        <form class="form" id="signup-form">
            <input type="text" id="firstname" placeholder="Prénom" required autocomplete="given-name">
            <input type="email" id="email" placeholder="Email" required autocomplete="email">
            <button type="submit" id="submit-btn">S'inscrire</button>
        </form>

        <div class="message" id="message"></div>
    </main>

    <footer class="footer">
        <a class="social disabled" data-disabled="true" title="Bientôt">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            Instagram
        </a>
        <a class="social disabled" data-disabled="true" title="Bientôt">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            YouTube
        </a>
        <a href="https://discord.gg/algolab" target="_blank" rel="noopener" class="social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
            Discord
        </a>
    </footer>

    <script>
        const WORKER_URL = 'https://newsletter-signup.charliejourdan.workers.dev';

        document.querySelectorAll('.social.disabled').forEach(el => {
            el.addEventListener('click', (e) => e.preventDefault());
        });

        const form = document.getElementById('signup-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageEl = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstname = document.getElementById('firstname').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!firstname || !email) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '...';
            messageEl.textContent = '';
            messageEl.className = 'message';

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, firstname })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (data.alreadyExists) {
                        messageEl.textContent = `Tu es déjà inscrit·e, ${firstname}.`;
                    } else {
                        messageEl.textContent = `Merci ${firstname}, c'est noté.`;
                    }
                    messageEl.className = 'message success';
                    form.reset();
                } else {
                    throw new Error(data.error || 'Erreur inconnue');
                }
            } catch (error) {
                console.error('Erreur:', error);
                messageEl.textContent = 'Oups, une erreur est survenue. Réessaie.';
                messageEl.className = 'message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "S'inscrire";
            }
        });
    </script>
</body>
</html>
